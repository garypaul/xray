<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<title>AOC 画像サービス</title>
		<script type="text/JavaScript">
<!--
function start_app()
{
	form_for_afc.start_app.value="start_aoc_mini";
	form_for_afc.submit();
}

function MM_preloadImages() { //v3.0
  var d=document; if(d.images){ if(!d.MM_p) d.MM_p=new Array();
    var i,j=d.MM_p.length,a=MM_preloadImages.arguments; for(i=0; i<a.length; i++)
    if (a[i].indexOf("#")!=0){ d.MM_p[j]=new Image; d.MM_p[j++].src=a[i];}}
}

function MM_findObj(n, d) { //v4.01
  var p,i,x;  if(!d) d=document; if((p=n.indexOf("?"))>0&&parent.frames.length) {
    d=parent.frames[n.substring(p+1)].document; n=n.substring(0,p);}
  if(!(x=d[n])&&d.all) x=d.all[n]; for (i=0;!x&&i<d.forms.length;i++) x=d.forms[i][n];
  for(i=0;!x&&d.layers&&i<d.layers.length;i++) x=MM_findObj(n,d.layers[i].document);
  if(!x && d.getElementById) x=d.getElementById(n); return x;
}

function MM_nbGroup(event, grpName) { //v6.0
  var i,img,nbArr,args=MM_nbGroup.arguments;
  if (event == "init" && args.length > 2) {
    if ((img = MM_findObj(args[2])) != null && !img.MM_init) {
      img.MM_init = true; img.MM_up = args[3]; img.MM_dn = img.src;
      if ((nbArr = document[grpName]) == null) nbArr = document[grpName] = new Array();
      nbArr[nbArr.length] = img;
      for (i=4; i < args.length-1; i+=2) if ((img = MM_findObj(args[i])) != null) {
        if (!img.MM_up) img.MM_up = img.src;
        img.src = img.MM_dn = args[i+1];
        nbArr[nbArr.length] = img;
    } }
  } else if (event == "over") {
    document.MM_nbOver = nbArr = new Array();
    for (i=1; i < args.length-1; i+=3) if ((img = MM_findObj(args[i])) != null) {
      if (!img.MM_up) img.MM_up = img.src;
      img.src = (img.MM_dn && args[i+2]) ? args[i+2] : ((args[i+1])? args[i+1] : img.MM_up);
      nbArr[nbArr.length] = img;
    }
  } else if (event == "out" ) {
    for (i=0; i < document.MM_nbOver.length; i++) {
      img = document.MM_nbOver[i]; img.src = (img.MM_dn) ? img.MM_dn : img.MM_up; }
  } else if (event == "down") {
    nbArr = document[grpName];
    if (nbArr)
      for (i=0; i < nbArr.length; i++) { img=nbArr[i]; img.src = img.MM_up; img.MM_dn = 0; }
    document[grpName] = nbArr = new Array();
    for (i=2; i < args.length-1; i+=2) if ((img = MM_findObj(args[i])) != null) {
      if (!img.MM_up) img.MM_up = img.src;
      img.src = img.MM_dn = (args[i+1])? args[i+1] : img.MM_up;
      nbArr[nbArr.length] = img;
  } }
}


//-->
</script>
	</head>
	<body onload="MM_preloadImages('buttonIMG/view1on.bmp','buttonIMG/view1off.bmp','buttonIMG/view2on.bmp','buttonIMG/view2off.bmp','buttonIMG/view3on.bmp','buttonIMG/view3off.bmp')">
		<form name="form_for_afc" method="post">
			<input type="hidden" name="start_app" value="start_app">
		</form>
		<a href="view_button.html" onClick="MM_nbGroup('over','view1','buttonIMG/view1on.bmp','buttonIMG/view1off.bmp',2);start_app();" onMouseOver="MM_nbGroup('over','view1','buttonIMG/view1on.bmp','buttonIMG/view1off.bmp',1);" onMouseOut="MM_nbGroup('out');"><img name="view1" src="buttonIMG/view1.bmp" width="170" height="40" border="0" alt=""></a>
		<a href="/index.html"  target="_blank" onClick="MM_nbGroup('over','view2','buttonIMG/view2on.bmp','buttonIMG/view2off.bmp',2);" onMouseOver="MM_nbGroup('over','view2','buttonIMG/view2on.bmp','buttonIMG/view2off.bmp',1);" onMouseOut="MM_nbGroup('out');"><img name="view2" src="buttonIMG/view2.bmp" width="170" height="40" border="0" alt=""></a>
		<a href="/viewer/index.htm"  target="_blank" onClick="MM_nbGroup('over','view3','buttonIMG/view3on.bmp','buttonIMG/view3off.bmp',2);" onMouseOver="MM_nbGroup('over','view3','buttonIMG/view3on.bmp','buttonIMG/view3off.bmp',1);" onMouseOut="MM_nbGroup('out');"><img name="view3" src="buttonIMG/view3.bmp" width="170" height="40" border="0" alt=""></a>
	</body>
</html>
