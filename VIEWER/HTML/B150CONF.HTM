<H1>2つの画像を比較する</H1>

<DIV CLASS="PAGE">


ビューワの画面を2つに分け、比較のために画像を並べて表示させます。

<OL>
<B><LI>画像が開いている状態で、<A HREF="R120TLBR.HTM" TARGET="BDY">ツールバー</A>の「比較モード」をクリックする。</B><BR>
ビューワの画面が分割され、それぞれの画面に、同じ画像が表示されます。<BR> 
開いている画像に複数のシリーズが含まれている場合は、セレクタから目的の画像を選ぶことにより、同じ検査の中の異なるシリーズを並べて比較することができます。 
</OL>
<H3 CLASS="TOP">参考</H3>
画面の分割を解除するには、<A HREF="R120TLBR.HTM" TARGET="BDY">ツールバー</A>の「比較モード」をもう一度クリックします。
