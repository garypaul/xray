<H1>はじめに</H1>

<DIV CLASS="PAGE">

このヘルプでは、診断画像ディスクの操作を説明します。<BR><BR>
左の「目次」から知りたい項目をクリックしてください。<!--（下線の付いていない項目をクリックすると、下位の項目の表示／非表示が切り替わります。）-->
<BR><BR>

<TABLE>
<TR><TD WIDTH="100%">
<H3>Webブラウザの設定について</H3>
このヘルプは、JavaScriptおよびスタイルシートを使用していますので、ご覧になるときは、これらを有効にしてください。<BR>
詳しくは、<A HREF="H120CREDIT.HTM"TARGET="BDY">「その他」のページの「JavaScriptとスタイルシートの設定」</A>を参照してください。

</UL>

<!--
［JavaScriptの設定］
1． ツールバーの「ツール」をクリックし、「インターネットオプション」を選択します。 
2． 「セキュリティ」のタブを選択し「このゾーンのセキュリティのレベル」内の「レベルのカスタマイズ」をクリックします。 
3． 「スクリプト」内の「アクティブスクリプト」を「有効にする」にチェックを入れ、「OK」をクリックします。 

［スタイルシートの設定］
1． ツールバーの「ツール」をクリックし、「インターネットオプション」を選択します。 
2． 「全般」のタブを選択し右下の「ユーザー補助」ボタンをクリックします。 
3． 表示された画面ですべてのチェックをはずし、「OK」をクリックします。 
-->
