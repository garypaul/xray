<H1>ツールバー</H1>

<DIV CLASS="PAGE">


<!--ここから本文-->
<!--「画像」／「シリーズ」ボタン-->

ツールバーには、「移動・選択」、「計測・アノテーション」、「回転・反転」、「トーン」、「その他」の5系統のツールが用意されています。<BR>
ツールバーは、通常版のビューワと簡易版のビューワでは異なります。
<BR><BR>

<H3>通常版ビューワのツールバー</H3>
<IMG SRC="../LocImg/IMG59TLBR.png"><BR><BR>

<H3>簡易版ビューワのツールバー</H3>
<IMG SRC="../LocImg/IMG59TLBRmini.png">

<BR><BR>

<H2>ビューワの通常版と簡易版の違い</H2>
簡易版のビューワは、通常版とくらべてツールバーのボタン数は少ないですが、ビューワとして利用できる機能は同じです。
利用できる機能については、<A HREF="H115CMMD.HTM" TARGET="BDY">「コマンド一覧」</A>を参照してください。
