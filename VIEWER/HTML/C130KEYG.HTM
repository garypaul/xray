<H1>特別な画像にしるしを付ける（キー画像）</H1>

<DIV CLASS="PAGE">

ビューワで開いている画像から、特別な画像にしるしを付け、「キー画像」として扱えます。キー画像として扱うことにより、特別な画像が見分けやすくなり<!--、また、キー画像のみをプリントするなどの操作もできます。-->ます。

<H2>キー画像を設定する</H2>
<A HREF="R160VARA.HTM" TARGET="BDY">ビューエリア</A>の画像から、キー画像として選択したい画像の右下にある黄色く囲まれた範囲（キー画像エリア）をクリックすると、鍵の絵がしるしとして付けられます。<BR>

<H3>キー画像を解除するには</H3>
キー画像エリアをクリックします。<BR>
鍵の絵が消え、通常の画像として扱われます。 <BR><BR>
