<H1>インフォメーションパレット</H1>

<DIV CLASS="PAGE">

表示されている画像のトーン（明るさ・コントラスト）や倍率を管理するための画面をインフォメーションパレットと呼びます。このパレットを使用することで、画像の<A HREF="B100BRCT.HTM" TARGET="BDY">トーン</A>や<A HREF="B130ZOOM.HTM" TARGET="BDY">倍率</A>を調整することができます。<BR><BR>
<H3>参考</H3>
インフォメーションパレット、<A HREF="R140OVWD.HTM" TARGET="BDY">オーバービューウィンドウ</A>、<A HREF="R150SCOT.HTM" TARGET="BDY">スカウト画像ウィンドウ</A>を移動した場合、その位置は保存されます。移動したことによって画面外に出て見えなくなってしまった場合などは、「ウィンドウ」メニューの「表示位置の整理」を選択することにより、それぞれの画面を出荷時の位置に戻すことができます。<BR><BR>
