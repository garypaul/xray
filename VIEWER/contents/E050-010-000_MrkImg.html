<h1>特別な画像にしるしを付ける（キー画像）</h1>
<div class="area_section">
	<div class="area_txt">
		<div class="area_para">
			<p>ビューワで開いている画像から、特別な画像にしるしを付け、「キー画像」として扱えます。キー画像として扱うことにより、特別な画像が見分けやすくなります。<br />キー画像にしたい画像を<a href="./contents/F060-010-000_Vwer.html" class="link_to_other_cont">セル</a>に表示し、右下にあるキー画像エリアをクリックすると、その画像がキー画像になり鍵の絵が付きます。
			</p>
			<div class="area_para">
				<p class="indent_3">
					<strong>注意：</strong>キー画像の設定は、ビューワを終了すると初期化されます。
				</p>
			</div><!--/area_para-->
		</div><!--/area_para-->
		<div class="area_para">
			<h2>キー画像を解除するには</h2>
			<p>キー画像エリアをクリックします。<br />鍵の絵が消え、通常の画像として扱われます。</p>
			<div class="area_image">
				<img src="./contents/images/E050-010-000_01.png" alt="キー画像エリアのスクリーンショット" class="w80" />
			</div>
	</div><!--/area_para-->
	</div><!--/area_txt-->
</div><!--/area_section-->
