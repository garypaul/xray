<h1>インフォメーションパレット</h1>
<div class="area_section">
	<div class="area_txt">
		<div class="area_para">
				<p>表示されている画像のトーン（明るさ・コントラスト）や倍率を管理するための画面をインフォメーションパレットと呼びます。このパレットを使用することで、画像の<a href="./contents/D040-020-000_AdjTne.html" class="link_to_other_cont">トーン</a>や<a href="./contents/D040-040-000_ZmImg.html" class="link_to_other_cont">倍率</a>を調整することができます。</p>	
		</div><!--/area_para-->
		<div class="area_image">
			<img src="./contents/images/F060-030-000_01.png" alt="インフォメーションパレットのスクリーンショット" class="w80" />
		</div>
		<div class="area_para">
			<h2>参考</h2>
				インフォメーションパレットの表示内容は、<a href="./contents/F060-010-000_Vwer.html" class="link_to_other_cont">ビューワウィンドウ</a>の縦のサイズによって異なることがあります。</p>
		</div><!--/area_para-->
	</div><!--/area_txt-->
