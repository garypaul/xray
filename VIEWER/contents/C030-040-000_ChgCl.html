<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="jp">
<head>
	<meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
	<title>セルの構成を変更する</title>
</head>
<body>
	<h1>セルの構成を変更する</h1>
	<div class="area_section">
		<div class="area_txt">
			<div class="area_para">
				<p>画面に表示するセルの縦横それぞれの枚数を変更するには、ツールバーの「1x1」（セルを1枚にする）、「2x1」（セルを横2枚にする）、「2x2」（セルを縦横2枚ずつにする）のいずれかのボタンをクリックします。</p>
				<div class="area_image">
					<img src="./contents/images/C030-040-000_01.png" alt="ツールバーでセルの構成を変更する操作を指示したスクリーンショット" class="w80" />
				</div>
			</div><!--area_para-->
			<div class="area_para">
				<p>その他のセル構成にしたい場合は、「レイアウト」メニューの「セル構成」を選ぶか、または、セルを右クリックすると表示される格子状の画面から縦横の枚数を指定します。</p>
				<div class="area_image">
					<img src="./contents/images/C030-040-000_02.png" alt="メニューからセルの構成を変更する操作を指示したスクリーンショット" class="w80" />
				</div>
			</div>
		</div><!--/area_txt-->
	</div><!--/area_section-->
</body>
</html>
